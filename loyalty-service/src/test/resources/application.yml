spring:
  grpc:
    server:
      port: 0
    client:
      channels:
        subscription-service:
          address: localhost:9999
  kafka:
    bootstrap-servers: localhost:9999
    consumer:
      group-id: loyalty-service-test
      auto-offset-reset: earliest
    listener:
      auto-startup: false

grpc:
  retry:
    max-attempts: 1
    initial-backoff-ms: 1
    backoff-multiplier: 1.0

loyalty:
  cashback-rate: 0.08
