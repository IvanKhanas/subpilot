spring:
  application:
    name: payment-service
  datasource:
    url: ${PAYMENT_DB_URL:jdbc:postgresql://localhost:5432/payment}
    username: ${PAYMENT_DB_USER:payment}
    password: ${PAYMENT_DB_PASSWORD:payment}
  jpa:
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/payment/db.changelog-master.yaml
  grpc:
    server:
      port: ${PAYMENT_GRPC_SERVER_PORT:9092}

server:
  port: ${PAYMENT_SERVER_PORT:8084}