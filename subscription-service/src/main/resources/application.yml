spring:
  application:
    name: subscription-service
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: ${SUBSCRIPTION_DB_URL:jdbc:postgresql://localhost:5432/subscription}
    username: ${SUBSCRIPTION_DB_USER:subscription}
    password: ${SUBSCRIPTION_DB_PASSWORD:subscription}
  jpa:
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/subscription/db.changelog-master.yaml
  grpc:
    server:
      port: ${SUBSCRIPTION_GRPC_SERVER_PORT:9091}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: subscription-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

subscription:
  free-quota: ${SUBSCRIPTION_FREE_QUOTA:10}
  free-quota-reset-period: ${SUBSCRIPTION_FREE_QUOTA_RESET_PERIOD:7d}
  default-model: ${SUBSCRIPTION_DEFAULT_MODEL:gpt-4o-mini}
  model-providers:
    gpt-4o-mini: openai
    gpt-4o: openai
    gpt-4-turbo: openai
  model-costs:
    gpt-4o-mini: 1
    gpt-4o: 2
    gpt-4-turbo: 3
  plans:
    openai-basic:
      provider: openai
      display-name: "Basic - 100 requests for OpenAI"
      price: 199.00
      currency: RUB
      allocations:
        - provider: openai
          requests: 100
    openai-pro:
      provider: openai
      display-name: "Pro - 300 requests for OpenAI"
      price: 499.00
      currency: RUB
      allocations:
        - provider: openai
          requests: 300

server:
  port: ${SUBSCRIPTION_SERVER_PORT:8083}
