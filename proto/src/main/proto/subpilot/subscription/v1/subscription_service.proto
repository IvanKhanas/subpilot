syntax = "proto3";

package subpilot.subscription.v1;

option java_package = "com.xeno.subpilot.proto.subscription.v1";
option java_multiple_files = true;

service SubscriptionService {
  rpc CheckAccess(CheckAccessRequest) returns (CheckAccessResponse);
  rpc RefundAccess(RefundAccessRequest) returns (RefundAccessResponse);
  rpc RegisterUser(RegisterUserRequest) returns (RegisterUserResponse);
  rpc GetModelPreference(GetModelPreferenceRequest) returns (GetModelPreferenceResponse);
  rpc SetModelPreference(SetModelPreferenceRequest) returns (SetModelPreferenceResponse);
  rpc GetPlans(GetPlansRequest) returns (GetPlansResponse);
  rpc GetPlanInfo(GetPlanInfoRequest) returns (GetPlanInfoResponse);
  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);
  rpc ActivateSubscription(ActivateSubscriptionRequest) returns (ActivateSubscriptionResponse);
}

message CheckAccessRequest {
  int64 user_id = 1;
  string model_id = 2;
}

message CheckAccessResponse {
  bool allowed = 1;
  DenialReason denial_reason = 2;
  int32 available_requests = 3;
  int64 reset_at_epoch = 4;
  int32 model_cost = 5;
  int32 free_consumed = 6;
  int32 paid_consumed = 7;
}

message RefundAccessRequest {
  int64 user_id = 1;
  string model_id = 2;
  int32 free_consumed = 3;
  int32 paid_consumed = 4;
}

message RefundAccessResponse {}

message RegisterUserRequest {
  int64 user_id = 1;
}

message RegisterUserResponse {
   bool is_new = 1;
   int32 free_quota = 2;
   string free_model_id = 3;
}

message GetModelPreferenceRequest {
  int64 user_id = 1;
}

message GetModelPreferenceResponse {
  string model_id = 1;
}

message SetModelPreferenceRequest {
  int64 user_id = 1;
  string model_id = 2;
}

message SetModelPreferenceResponse {
  bool provider_changed = 1;
  int32 model_cost = 2;
  string provider = 3;
}

enum DenialReason {
  DENIAL_REASON_UNSPECIFIED = 0;
  QUOTA_EXHAUSTED = 1;
  NO_SUBSCRIPTION = 2;
  BLOCKED = 3;
}

message GetPlansRequest {}

message GetPlansResponse {
  repeated PlanInfo plans = 1;
}

message GetPlanInfoRequest {
  string plan_id = 1;
}

message GetPlanInfoResponse {
  PlanInfo plan = 1;
}

message PlanAllocation {
  string provider = 1;
  int32 requests = 2;
}

message PlanInfo {
  string plan_id = 1;
  string provider = 2;
  string display_name = 3;
  string price = 4;
  string currency = 5;
  repeated PlanAllocation allocations = 6;
}

message GetBalanceRequest {
    int64 user_id = 1;
}

message ProviderBalance {
    string provider = 1;
    int32 requests_remaining = 2;
    int64 next_reset_at_epoch = 3;
}

message GetBalanceResponse {
    repeated ProviderBalance free_balances = 1;
    repeated ProviderBalance paid_balances = 2;
}
message ActivateSubscriptionRequest {
  int64 user_id = 1;
  string plan_id = 2;
  string idempotency_key = 3;
}

message ActivateSubscriptionResponse {}
