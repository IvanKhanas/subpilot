syntax = "proto3";

package subpilot.chat.v1;

import "subpilot/subscription/v1/subscription_service.proto";

option java_package = "com.xeno.subpilot.proto.chat.v1";
option java_multiple_files = true;

service ChatService {
  rpc ProcessMessage(ProcessMessageRequest) returns (ProcessMessageResponse);
  rpc ClearHistory(ClearHistoryRequest) returns (ClearHistoryResponse);
}

message ProcessMessageRequest {
  int64 user_id = 1;
  string text = 2;
  int64 chat_id = 3;
}

message ProcessMessageResponse {
  string text = 1;
  subpilot.subscription.v1.DenialReason denial_reason = 2;
  string model_id = 3;
  int32 available_requests = 4;
  int64 reset_at_epoch = 5;
  int32 model_cost = 6;
}

message ClearHistoryRequest {
  int64 chat_id = 1;
}

message ClearHistoryResponse {}
