include:
  - infra/docker-compose.yml

services:
  subscription-service:
    build:
      context: .
      dockerfile: subscription-service/Dockerfile
    environment:
      SUBSCRIPTION_DB_URL: jdbc:postgresql://postgres:5432/${SUBSCRIPTION_DB_NAME:-subscription}
      SUBSCRIPTION_DB_USER: ${SUBSCRIPTION_DB_USER}
      SUBSCRIPTION_DB_PASSWORD: ${SUBSCRIPTION_DB_PASSWORD}
      SUBSCRIPTION_GRPC_SERVER_PORT: 9091
      KAFKA_BOOTSTRAP_SERVERS: kafka1:9092,kafka2:9092,kafka3:9092
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy

  chat-service:
    build:
      context: .
      dockerfile: chat-service/Dockerfile
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SUBSCRIPTION_GRPC_ADDRESS: subscription-service:9091
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      subscription-service:
        condition: service_started

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    environment:
      PAYMENT_DB_URL: jdbc:postgresql://postgres:5432/payment
      PAYMENT_DB_USER: payment
      PAYMENT_DB_PASSWORD: ${PAYMENT_DB_PASSWORD}
      PAYMENT_GRPC_SERVER_PORT: 9094
      SUBSCRIPTION_GRPC_ADDRESS: subscription-service:9091
      KAFKA_BOOTSTRAP_SERVERS: kafka1:9092,kafka2:9092,kafka3:9092
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY}
      YOOKASSA_RETURN_URL: ${YOOKASSA_RETURN_URL}
    depends_on:
      postgres:
        condition: service_healthy
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
      subscription-service:
        condition: service_started

  loyalty-service:
    build:
      context: .
      dockerfile: loyalty-service/Dockerfile
    environment:
      LOYALTY_DB_URL: jdbc:postgresql://postgres:5432/${LOYALTY_DB_NAME:-loyalty}
      LOYALTY_DB_USER: ${LOYALTY_DB_USER}
      LOYALTY_DB_PASSWORD: ${LOYALTY_DB_PASSWORD}
      LOYALTY_GRPC_SERVER_PORT: 9095
      SUBSCRIPTION_GRPC_ADDRESS: subscription-service:9091
      KAFKA_BOOTSTRAP_SERVERS: kafka1:9092,kafka2:9092,kafka3:9092
      LOYALTY_CASHBACK_RATE: ${LOYALTY_CASHBACK_RATE:-0.08}
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
      subscription-service:
        condition: service_started

  tg-bot-service:
    build:
      context: .
      dockerfile: tg-bot-service/Dockerfile
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      SUPPORT_OPERATOR_TAG: ${SUPPORT_OPERATOR_TAG:-unknown}
      CHAT_GRPC_ADDRESS: chat-service:9090
      SUBSCRIPTION_GRPC_ADDRESS: subscription-service:9091
      PAYMENT_GRPC_ADDRESS: payment-service:9094
      LOYALTY_GRPC_ADDRESS: loyalty-service:9095
      KAFKA_BOOTSTRAP_SERVERS: kafka1:9092,kafka2:9092,kafka3:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
      chat-service:
        condition: service_started
      payment-service:
        condition: service_started
      loyalty-service:
        condition: service_started
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
