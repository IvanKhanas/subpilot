spring:
  application:
    name: chat-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  grpc:
    server:
      port: ${CHAT_GRPC_SERVER_PORT:9090}
    client:
      channels:
        subscription-service:
          address: ${SUBSCRIPTION_GRPC_ADDRESS:localhost:9091}

openai:
  api-key: ${OPENAI_API_KEY}
  max-completion-tokens: ${OPENAI_MAX_COMPLETION_TOKENS:2048}

chat:
  history:
    max-messages: ${CHAT_HISTORY_MAX_MESSAGES:20}
    ttl: ${CHAT_HISTORY_TTL:PT20M}

grpc:
  retry:
    max-attempts: ${GRPC_RETRY_MAX_ATTEMPTS:3}
    initial-backoff-ms: ${GRPC_RETRY_INITIAL_BACKOFF_MS:200}
    backoff-multiplier: ${GRPC_RETRY_BACKOFF_MULTIPLIER:3.0}

server:
  port: ${CHAT_SERVER_PORT:8082}
