spring:
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false
  grpc:
    client:
      channels:
        chat-service:
          address: localhost:9090
  data:
    redis:
      host: localhost
      port: 6379
      password: ""
  kafka:
    bootstrap-servers: localhost:9999
    consumer:
      group-id: tg-bot-service
      auto-offset-reset: earliest

telegram:
  bot:
    token: test-token
    polling-timeout: 1

navigation:
  stack-ttl: PT20M

support:
  operator-tag: "@test_support"

grpc:
  retry:
    max-attempts: 1
    initial-backoff-ms: 1
    backoff-multiplier: 1.0
