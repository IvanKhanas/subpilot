spring:
  application:
    name: tg-bot-service
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false
  grpc:
    client:
      channels:
        chat-service:
          address: ${CHAT_GRPC_ADDRESS:localhost:9090}
        subscription-service:
          address: ${SUBSCRIPTION_GRPC_ADDRESS:localhost:9091}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN}
    polling-timeout: ${TELEGRAM_POLLING_TIMEOUT:30}
    polling-retry-delay-ms: ${TELEGRAM_POLLING_RETRY_DELAY_MS:5000}

navigation:
  stack-ttl: ${NAVIGATION_STACK_TTL:PT20M}

support:
  support-tag: ${SUPPORT_OPERATOR_TAG:unknown}

grpc:
  retry:
    max-attempts: ${GRPC_RETRY_MAX_ATTEMPTS:3}
    initial-backoff-ms: ${GRPC_RETRY_INITIAL_BACKOFF_MS:200}
    backoff-multiplier: ${GRPC_RETRY_BACKOFF_MULTIPLIER:3.0}

server:
  port: ${TELEGRAM_BOT_SERVER_PORT:1991}
